<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Nunito:wght@400;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #fdf6e3;
    font-family: 'Nunito', sans-serif;
    height: 100vh;
  }
  .menu-card {
    width: 450px;
    height: 750px;
    background: #fff;
    border: 12px solid #e9edc9;
    border-radius: 40px;
    padding: 40px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.05);
    position: relative;
    overflow: hidden;
    color: #606c38;
    background-image: 
      radial-gradient(circle at 10% 20%, rgba(254, 250, 224, 0.5) 0%, transparent 20%),
      radial-gradient(circle at 90% 80%, rgba(212, 163, 115, 0.1) 0%, transparent 30%);
  }
  .header {
    text-align: center;
    margin-bottom: 30px;
  }
  .title {
    font-family: 'Dancing Script', cursive;
    font-size: 42px;
    color: #283618;
    margin: 0;
  }
  .subtitle {
    font-family: 'Pacifico', cursive;
    font-size: 20px;
    color: #dda15e;
    margin: 0;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .section {
    margin-bottom: 30px;
  }
  .section-title {
    font-size: 22px;
    font-weight: 700;
    color: #283618;
    border-bottom: 3px solid #fefae0;
    padding-bottom: 5px;
    margin-bottom: 15px;
    display: flex;
    align-items: center;
  }
  .section-title::before {
    content: '✦';
    margin-right: 10px;
    color: #dda15e;
  }
  ul {
    list-style: none;
    padding: 0;
    margin: 0;
  }
  li {
    margin-bottom: 12px;
    display: flex;
    justify-content: space-between;
    font-size: 18px;
    align-items: center;
    padding: 5px 10px;
    border-radius: 10px;
    transition: background 0.3s;
  }
  li:hover {
    background: #fefae0;
  }
  .item-name {
    flex-grow: 1;
  }
  .icon {
    margin-right: 15px;
    font-size: 20px;
  }
  .footer {
    position: absolute;
    bottom: 40px;
    left: 0;
    right: 0;
    text-align: center;
  }
  .quote {
    font-family: 'Dancing Script', cursive;
    font-size: 24px;
    color: #bc6c25;
    margin-bottom: 5px;
  }
  .social {
    font-size: 14px;
    color: #dda15e;
    opacity: 0.7;
  }
  .anime-decor {
    position: absolute;
    z-index: 0;
    pointer-events: none;
  }
</style>
</head>
<body>
<div class="menu-card">
  <div class="header">
    <h1 class="title">Blessing from afar</h1>
    <p class="subtitle">Cafe Menu</p>
  </div>
  
  <div class="section">
    <div class="section-title">Trà Đặc Biệt</div>
    <ul>
      <li><span class="icon">🍵</span><span class="item-name">Trà dưỡng nhan</span></li>
      <li><span class="icon">🍹</span><span class="item-name">Trà chanh dây kim quất</span></li>
      <li><span class="icon">🍐</span><span class="item-name">Trà mãng cầu</span></li>
    </ul>
  </div>

  <div class="section">
    <div class="section-title">Cà Phê & Matcha</div>
    <ul>
      <li><span class="icon">☕</span><span class="item-name">Coffee muối</span></li>
      <li><span class="icon">🍵</span><span class="item-name">Matcha latte kem muối</span></li>
      <li><span class="icon">🍫</span><span class="item-name">CaCao Milo dầm</span></li>
    </ul>
  </div>

  <div class="section">
    <div class="section-title">Món Giải Nhiệt</div>
    <ul>
      <li><span class="icon">🍦</span><span class="item-name">Kem Ý & Sinh tố</span></li>
      <li><span class="icon">🍧</span><span class="item-name">Sâm dứa đá bào</span></li>
    </ul>
  </div>

  <div class="footer">
    <div class="quote">"Ở đây có sự bình yên" ✨</div>
    <div class="social">@BlessingFromAfar</div>
  </div>
</div>
</body>
</html>
